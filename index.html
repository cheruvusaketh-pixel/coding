<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;700&display=swap" rel="stylesheet">

<style>

/* 🌌 BACKGROUND */
body {
    margin: 0;
    height: 100vh;

    background-image: url("./bg.jpeg");
    background-position: center;
    background-repeat: no-repeat;
    background-size: 130%;

    overflow: hidden;
    font-family: 'Poppins', sans-serif;
}

/* 🌈 TITLE */
.title {
    position: absolute;
    top: 8%;
    width: 100%;
    text-align: center;
    font-size: 48px;
    font-family: 'Great Vibes', cursive;
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbowMove 5s linear infinite;
    z-index: 3;
}

@keyframes rainbowMove {
    0% { background-position: 0%; }
    100% { background-position: 200%; }
}

/* 📸 PHOTOS */
.photo {
    position: absolute;
    width: 120px;
    height: 160px;
    object-fit: cover;
    border: 4px solid white;
    border-radius: 12px;
    opacity: 0;
    transform: scale(0.5);
    transition: all 1s ease;
    z-index: 3;
}

/* 💖 GLOW */
.photo:last-child {
    transform: scale(1.2);
    box-shadow: 0 0 25px pink;
}

/* 🎬 BIG BOLD TEXT */
#cinema {
    position: absolute;
    top: 50%;
    width: 100%;
    text-align: center;
    font-size: 36px;
    font-weight: 700;
    font-family: 'Great Vibes', cursive;
    background: linear-gradient(90deg, pink, violet, cyan, yellow, orange);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rainbowMove 6s linear infinite;
    z-index: 4;
}

/* 💍 KEEP RING ORIGINAL COLOR */
.ring {
    background: none !important;
    -webkit-text-fill-color: initial !important;
}

</style>
</head>

<body>

<div class="title">Happy Birthday My Love ❤️</div>
<div id="cinema"></div>

<script>

/* ❤️ HEART SHAPE */
let positions = [
 [40,18], [55,18],
 [30,28], [65,28],
 [25,40], [70,40],
 [30,53], [65,53],
 [40,65], [55,65],
 [47.5,78]
];

/* 📸 PHOTOS */
let photos = [
 "photo1.jpeg","photo2.jpeg","photo3.jpeg","photo4.jpeg",
 "photo5.jpeg","photo6.jpeg","photo7.jpeg","photo8.jpeg",
 "photo9.jpeg","photo10.jpeg","photo11.jpeg"
];

let i=0;

function showPhotos(){
 if(i>=photos.length) return;

 let img=document.createElement("img");
 img.src=photos[i];
 img.className="photo";

 let pos = positions[i];

 img.style.left=pos[0]+"vw";
 img.style.top=pos[1]+"vh";

 document.body.appendChild(img);

 setTimeout(()=>{
  img.style.opacity=1;
  img.style.transform="scale(1)";
 },100);

 i++;
 setTimeout(showPhotos,900);
}

showPhotos();

/* 🎬 TEXT */
let lines=[
 "You came into my life...",
 "And changed everything 💖",
 "Today is your special day 🎂",
 "Happy Birthday My Love ❤️",
 "Will you marry me? <span class='ring'>💍🥺</span>",
 "I promise forever with you 💖 <span class='ring'>💍</span>"
];

let j=0;

function showText(){
 if(j>=lines.length) return;

 document.getElementById("cinema").innerHTML=lines[j];
 j++;
 setTimeout(showText,2500);
}

setTimeout(showText,2000);

</script>

</body>
</html>
